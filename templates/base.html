<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}TermoPilota{% endblock %}</title>
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/theme.css') }}" rel="stylesheet">
  {% block head_extra %}{% endblock %}
  {% block extra_css %}{% endblock %}
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark">
  <div class="container-lg d-flex justify-content-between align-items-center">
    <div class="d-flex align-items-center gap-3">
      <a class="navbar-brand mb-0" href="/">
        <i class="bi bi-house-heart-fill me-2" style="color:#e07b39;"></i>
        TermoPilota
      </a>
      <a href="/" class="text-decoration-none small top-nav-link {% if request.endpoint == 'index' %}active{% endif %}">
        <i class="bi bi-speedometer2 me-1"></i>Dashboard
      </a>
      {% if current_user.is_admin %}
      <a href="/admin/" class="text-decoration-none small top-nav-link {% if request.endpoint and request.endpoint.startswith('admin.') %}active{% endif %}">
        <i class="bi bi-gear me-1"></i>Admin
      </a>
      {% endif %}
    </div>
    <div class="d-flex align-items-center gap-2">
      <button type="button" class="theme-toggle" onclick="toggleTema()" aria-label="Cambia tema">
        <i id="themeIcon" class="bi bi-moon-fill"></i>
      </button>
      <a href="{{ url_for('account') }}" class="text-decoration-none small top-nav-link {% if request.endpoint == 'account' %}active{% endif %}">
        <i class="bi bi-person me-1"></i>{{ current_user.username }}
      </a>
      <a href="/logout" class="top-nav-link small text-decoration-none" title="Esci">
        <i class="bi bi-box-arrow-right"></i>
      </a>
    </div>
  </div>
</nav>

{% block content %}{% endblock %}

<footer class="tp-footer py-3 mt-2">
  <div class="container-lg d-flex justify-content-between align-items-center" style="font-size:.8rem;">
    <span><i class="bi bi-thermometer-half me-1"></i>TermoPilota</span>
    <span>Meteo: <a href="https://open-meteo.com" target="_blank" rel="noopener">Open-Meteo</a></span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/admin.js') }}"></script>
{% block scripts %}{% endblock %}
</body>
</html>
