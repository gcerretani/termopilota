<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Accedi — TermoPilota</title>
  <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/theme.css') }}" rel="stylesheet">
</head>
<body class="login-page">

<div class="login-card">
  <div class="text-center">
    <i class="bi bi-house-heart-fill" style="font-size: 2.5rem; color: #e07b39;"></i>
    <div class="login-title">TermoPilota</div>
    <div class="login-subtitle">Controllo intelligente del riscaldamento</div>
  </div>

  {% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
    <div class="alert alert-{{ 'danger' if category == 'error' else category }} alert-dismissible fade show py-2" style="font-size:.88rem;">
      {{ message }}
      <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
  {% endif %}
  {% endwith %}

  <form method="POST" action="{{ url_for('login') }}">
    <input type="hidden" name="next" value="{{ next_url }}">
    <div class="mb-3">
      <label class="form-label" for="username">Utente</label>
      <input type="text" class="form-control" id="username" name="username" required autofocus autocomplete="username">
    </div>
    <div class="mb-3">
      <label class="form-label" for="password">Password</label>
      <input type="password" class="form-control" id="password" name="password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn btn-login w-100">Accedi</button>
  </form>

  {% if google_abilitato %}
  <div class="login-divider">oppure</div>
  <a href="{{ url_for('login_google', next=next_url) }}" class="btn btn-google w-100">
    <i class="bi bi-google me-2"></i>Accedi con Google
  </a>
  {% endif %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
